<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Praktikum Azure Static Web Apps</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ffd6e7, #ffeef5);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      width: 100%;
      max-width: 500px;
      padding: 30px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(255, 105, 180, 0.2);
      border: 4px solid #ffc1da;
    }

    .profile-img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #ff8fc3;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
    }

    h1 {
      color: #ff4f9a;
      margin-bottom: 15px;
      font-size: 30px;
    }

    p {
      color: #555;
      font-size: 16px;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .tag {
      display: inline-block;
      margin-top: 10px;
      background: #ffb6d5;
      color: white;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
    }

    .heart {
      font-size: 24px;
      margin-top: 15px;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Ganti foto.jpg dengan nama foto kamu -->
    <img src="foto.jpg" alt="Foto Saya" class="profile-img">

    <h1>🌸 Praktikum Azure 🌸</h1>

    <p>Halaman ini berhasil di-deploy menggunakan Azure Static Web Apps.</p>

    <p><b>Layanan:</b> Azure Static Web Apps</p>
    <p><b>Deployment:</b> GitHub Repository</p>

    <div class="tag">✨ Cute Pink Version ✨</div>

    <div class="heart">💖</div>
  </div>
</body>
</html>
